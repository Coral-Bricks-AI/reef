<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 660" role="img" aria-labelledby="architecture-title">
  <title id="architecture-title">Architecture of the AlphaCumen agent harness: a user query routes through a Planner LLM that picks specialists and loads skills, three+ specialists run in parallel against their own skills + tools, and a Synthesizer LLM merges their atom-shaped outputs into the final answer.</title>

  <defs>
    <!-- Coral pill gradient — vertical, slightly darker at the bottom
         so the pill reads as a 3D surface, not a flat slab. -->
    <linearGradient id="pillCoral" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#d94a3f"/>
      <stop offset="100%" stop-color="#b53227"/>
    </linearGradient>

    <!-- Specialist-card fill: very pale coral wash, top-to-bottom -->
    <linearGradient id="cardWash" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#fff5ef"/>
      <stop offset="100%" stop-color="#fde6d6"/>
    </linearGradient>

    <!-- Soft slate fill for the query pill (top of diagram) -->
    <linearGradient id="queryWash" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f4f5"/>
    </linearGradient>

    <!-- Arrow markers — coral for routing (model-driven decisions),
         slate for fan-in (deterministic collection of results). -->
    <marker id="arrowCoral" viewBox="0 0 10 10" refX="8.5" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#b53227"/>
    </marker>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="8.5" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#52525b"/>
    </marker>

    <!-- Drop-shadow filter shared by coral pills + specialist cards
         so depth reads consistently across the diagram. -->
    <filter id="lift" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.6"/>
      <feOffset dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style><![CDATA[
    .title       { fill: #18181b; font: 700 17px ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .caption     { fill: #71717a; font: 500 12px ui-sans-serif, system-ui, sans-serif; }
    .pillH1      { fill: #ffffff; font: 700 14px ui-sans-serif, system-ui, sans-serif; }
    .pillSub     { fill: #ffe1d2; font: 500 11.5px ui-sans-serif, system-ui, sans-serif; }
    .queryH      { fill: #18181b; font: 700 14px ui-sans-serif, system-ui, sans-serif; }
    .querySub    { fill: #52525b; font: 500 12px ui-sans-serif, system-ui, sans-serif; font-style: italic; }
    .cardH       { fill: #18181b; font: 700 14px ui-sans-serif, system-ui, sans-serif; }
    .tool        { fill: #b53227; font: 600 11.5px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .row         { fill: #71717a; font: 500 11.5px ui-sans-serif, system-ui, sans-serif; }
    .finalH      { fill: #18181b; font: 700 14px ui-sans-serif, system-ui, sans-serif; }
    .stroke-q    { stroke: #d4d4d8; stroke-width: 1.4; fill: none; }
    .stroke-c    { stroke: #f1c4ad; stroke-width: 1; fill: none; }
    .edge-coral  { stroke: #b53227; stroke-width: 2.2; fill: none; opacity: 0.92; }
    .edge-slate  { stroke: #52525b; stroke-width: 1.7;  fill: none; opacity: 0.85; }
    .edge-down   { stroke: #52525b; stroke-width: 1.7; fill: none; opacity: 0.85; }
  ]]></style>

  <!-- =================== Title block =================== -->
  <text class="title"   x="40" y="34">Architecture of the AlphaCumen harness</text>
  <text class="caption" x="40" y="54">Planner picks specialists + loads skills · specialists run in parallel · synthesizer merges</text>

  <!-- =================== Query pill =================== -->
  <g>
    <rect x="340" y="92" width="240" height="56" rx="28"
          fill="url(#queryWash)" stroke="#d4d4d8" stroke-width="1.2"/>
    <text class="queryH"  x="460" y="116" text-anchor="middle">user query</text>
    <text class="querySub" x="460" y="135" text-anchor="middle">“What was Tesla's free cash flow…?”</text>
  </g>

  <!-- arrow query -> planner -->
  <line class="edge-down" x1="460" y1="148" x2="460" y2="184"
        marker-end="url(#arrowSlate)"/>

  <!-- =================== Planner pill =================== -->
  <g filter="url(#lift)">
    <rect x="320" y="188" width="280" height="68" rx="14"
          fill="url(#pillCoral)"/>
    <text class="pillH1"  x="460" y="218" text-anchor="middle">Planner (LLM)</text>
    <text class="pillSub" x="460" y="238" text-anchor="middle">reads skill index · picks specialists · loads skills</text>
  </g>

  <!-- =================== Routing fan-out (coral edges) =================== -->
  <!-- Smooth cubic bezier from planner bottom (460, 256) to each card top center -->
  <path class="edge-coral" d="M 460 256 C 460 296 175 296 175 328" marker-end="url(#arrowCoral)"/>
  <path class="edge-coral" d="M 460 256 L 460 328"                  marker-end="url(#arrowCoral)"/>
  <path class="edge-coral" d="M 460 256 C 460 296 745 296 745 328" marker-end="url(#arrowCoral)"/>

  <!-- =================== Specialist row (3 cards) =================== -->
  <!-- Card 1: stock analyst -->
  <g filter="url(#lift)">
    <rect x="80" y="332" width="190" height="124" rx="14"
          fill="url(#cardWash)" stroke="#f1c4ad" stroke-width="1.1"/>
    <text class="cardH" x="175" y="364" text-anchor="middle">stock analyst</text>
    <line x1="104" y1="382" x2="246" y2="382" stroke="#f1c4ad" stroke-width="1"/>
    <text class="tool" x="104" y="406">skill: dcf_walk</text>
    <text class="tool" x="104" y="424">skill: fcf_extract</text>
    <text class="tool" x="104" y="442">tool:  sec_filings</text>
  </g>
  <!-- Card 2: sector analyst -->
  <g filter="url(#lift)">
    <rect x="365" y="332" width="190" height="124" rx="14"
          fill="url(#cardWash)" stroke="#f1c4ad" stroke-width="1.1"/>
    <text class="cardH" x="460" y="364" text-anchor="middle">sector analyst</text>
    <line x1="389" y1="382" x2="531" y2="382" stroke="#f1c4ad" stroke-width="1"/>
    <text class="tool" x="389" y="406">skill: peer_compare</text>
    <text class="tool" x="389" y="424">skill: market_share</text>
    <text class="tool" x="389" y="442">tool:  prices_db</text>
  </g>
  <!-- Card 3: risk analyst -->
  <g filter="url(#lift)">
    <rect x="650" y="332" width="190" height="124" rx="14"
          fill="url(#cardWash)" stroke="#f1c4ad" stroke-width="1.1"/>
    <text class="cardH" x="745" y="364" text-anchor="middle">risk analyst</text>
    <line x1="674" y1="382" x2="816" y2="382" stroke="#f1c4ad" stroke-width="1"/>
    <text class="tool" x="674" y="406">skill: covenant_scan</text>
    <text class="tool" x="674" y="424">skill: debt_ladder</text>
    <text class="tool" x="674" y="442">tool:  filings_get</text>
  </g>

  <!-- Caption strip under specialists -->
  <text class="caption" x="460" y="486" text-anchor="middle">parallel threads · isolated context · each emits an atom-shaped result</text>

  <!-- =================== Fan-in (slate edges) =================== -->
  <path class="edge-slate" d="M 175 456 C 175 504 460 504 460 522" marker-end="url(#arrowSlate)"/>
  <path class="edge-slate" d="M 460 456 L 460 522"                 marker-end="url(#arrowSlate)"/>
  <path class="edge-slate" d="M 745 456 C 745 504 460 504 460 522" marker-end="url(#arrowSlate)"/>

  <!-- =================== Synthesizer pill =================== -->
  <g filter="url(#lift)">
    <rect x="320" y="526" width="280" height="62" rx="14"
          fill="url(#pillCoral)"/>
    <text class="pillH1"  x="460" y="554" text-anchor="middle">Synthesizer (LLM)</text>
    <text class="pillSub" x="460" y="574" text-anchor="middle">merges atoms · emits grader-ready answer</text>
  </g>

  <!-- arrow synth -> final -->
  <line class="edge-down" x1="460" y1="588" x2="460" y2="618"
        marker-end="url(#arrowSlate)"/>

  <!-- =================== Final answer text =================== -->
  <text class="finalH" x="460" y="640" text-anchor="middle">final answer</text>

</svg>
