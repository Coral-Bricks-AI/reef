    .label { fill: #475569; font-size: 13px; }
    .axis { fill: #94a3b8; font-size: 11px; }
    .grid { stroke: #e2e8f0; stroke-width: 1; }
    .axis-line { stroke: #cbd5e1; stroke-width: 1; }
    .bar-coral { fill: #e15a3a; }
    .bar-gray { fill: #cbd5e1; }
    .value-cb { fill: #c23d3d; font-size: 13px; font-weight: 700; }
    .value { fill: #475569; font-size: 12px; font-weight: 600; }
    .caption { fill: #94a3b8; font-size: 11px; font-style: italic; }
  </style>

