  <text x="400" y="26" text-anchor="middle" class="title">Vals AI Finance Agent Benchmark</text>

  <!-- Layout:
       Labels right-aligned ending at x=255.
       Logos at x=260 (20×20, centered vertically on each bar).
       Bars from x=290 to x=730 (440 wide; 1% = 4.4px).
       X-axis ticks: 0=290, 25=400, 50=510, 75=620, 100=730.
       Two groups stacked: Coral Bricks (1 row) then Vals AI default (5 rows). -->

  <!-- Vertical grid lines span both groups -->
  <line x1="290" y1="70" x2="290" y2="360" class="grid"/>
  <line x1="400" y1="70" x2="400" y2="360" class="grid"/>
  <line x1="510" y1="70" x2="510" y2="360" class="grid"/>
  <line x1="620" y1="70" x2="620" y2="360" class="grid"/>
  <line x1="730" y1="70" x2="730" y2="360" class="grid"/>

  <!-- ===== Group 1: AlphaCumen · domain-specific finance agent ===== -->
  <text x="40" y="62" class="group-header">AlphaCumen · domain-specific finance agent (7 agents · 69 skills · 4 datasets)</text>
  <line x1="40" y1="70" x2="760" y2="70" class="group-rule"/>

