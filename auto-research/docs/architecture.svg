<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="520" viewBox="0 0 1250 520" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="1250" height="520" fill="#ffffff"/>

  <defs>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e15a3a"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="625" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Auto-research pipeline — four LLM agents on a shared queue, with a human in the loop</text>

  <!-- Architect (top-left) -->
  <rect x="60" y="70" width="240" height="100" rx="10" fill="#f9fafb" stroke="#e15a3a" stroke-width="1.5"/>
  <text x="180" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#e15a3a">Architect (LLM)</text>
  <text x="180" y="120" text-anchor="middle" font-size="11" fill="#1f2937">Drafts run.spec + code from</text>
  <text x="180" y="136" text-anchor="middle" font-size="11" fill="#1f2937">a question or an auto-suggest</text>

  <!-- Postgres queue (top-center, prominent) -->
  <rect x="485" y="70" width="280" height="100" rx="14" fill="#fff7ed" stroke="#e15a3a" stroke-width="2.5"/>
  <text x="625" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#e15a3a">Postgres queue</text>
  <text x="625" y="114" text-anchor="middle" font-size="11" fill="#1f2937">cb_queue.experiments</text>
  <text x="625" y="134" text-anchor="middle" font-size="10" fill="#6b7280">enqueued → coding → ready →</text>
  <text x="625" y="148" text-anchor="middle" font-size="10" fill="#6b7280">executing → executed → analyzing</text>

  <!-- GPU Worker (top-right) -->
  <rect x="950" y="70" width="240" height="100" rx="10" fill="#f9fafb" stroke="#e15a3a" stroke-width="1.5"/>
  <text x="1070" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#e15a3a">GPU Worker (LLM)</text>
  <text x="1070" y="120" text-anchor="middle" font-size="11" fill="#1f2937">Claims ready task → trains +</text>
  <text x="1070" y="136" text-anchor="middle" font-size="11" fill="#1f2937">evals on H100; debug LLM on miss</text>
  <text x="1070" y="152" text-anchor="middle" font-size="11" fill="#1f2937">on kernel / OOM / env failures</text>

  <!-- Architect → Queue -->
  <line x1="300" y1="120" x2="483" y2="120" stroke="#e15a3a" stroke-width="1.6" marker-end="url(#arrow-coral)"/>
  <text x="392" y="111" text-anchor="middle" font-size="10" fill="#374151">writes</text>

  <!-- Queue ⇄ GPU Worker (offset bidirectional) -->
  <line x1="765" y1="100" x2="948" y2="100" stroke="#e15a3a" stroke-width="1.6" marker-end="url(#arrow-coral)"/>
  <text x="856" y="92" text-anchor="middle" font-size="10" fill="#374151">claims ready</text>
  <line x1="950" y1="140" x2="767" y2="140" stroke="#e15a3a" stroke-width="1.6" marker-end="url(#arrow-coral)"/>
  <text x="856" y="158" text-anchor="middle" font-size="10" fill="#374151">writes results</text>

  <!-- Human overseer (bottom-left) -->
  <rect x="60" y="340" width="200" height="100" rx="10" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="160" y="366" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Human overseer</text>
  <text x="160" y="390" text-anchor="middle" font-size="11" fill="#1f2937">Redirects, vetoes</text>
  <text x="160" y="406" text-anchor="middle" font-size="11" fill="#1f2937">auto-suggests, files</text>
  <text x="160" y="422" text-anchor="middle" font-size="11" fill="#1f2937">constraints, kills runs</text>

  <!-- Analyzer (bottom-center-left) -->
  <rect x="290" y="340" width="200" height="100" rx="10" fill="#f9fafb" stroke="#e15a3a" stroke-width="1.5"/>
  <text x="390" y="366" text-anchor="middle" font-size="14" font-weight="700" fill="#e15a3a">Analyzer (LLM)</text>
  <text x="390" y="390" text-anchor="middle" font-size="11" fill="#1f2937">Reads results →</text>
  <text x="390" y="406" text-anchor="middle" font-size="11" fill="#1f2937">verdict (done /</text>
  <text x="390" y="422" text-anchor="middle" font-size="11" fill="#1f2937">falsified / blocked)</text>

  <!-- Auto-suggester (bottom-center-right) -->
  <rect x="520" y="340" width="200" height="100" rx="10" fill="#f9fafb" stroke="#e15a3a" stroke-width="1.5"/>
  <text x="620" y="366" text-anchor="middle" font-size="14" font-weight="700" fill="#e15a3a">Auto-suggester (LLM)</text>
  <text x="620" y="390" text-anchor="middle" font-size="11" fill="#1f2937">Proposes the next</text>
  <text x="620" y="406" text-anchor="middle" font-size="11" fill="#1f2937">experiment, enqueues</text>
  <text x="620" y="422" text-anchor="middle" font-size="11" fill="#1f2937">it for the Architect</text>

  <!-- Queue → Analyzer -->
  <line x1="540" y1="170" x2="430" y2="338" stroke="#e15a3a" stroke-width="1.6" marker-end="url(#arrow-coral)"/>
  <text x="450" y="248" text-anchor="middle" font-size="10" fill="#374151" transform="rotate(58 450 248)">reads executed</text>

  <!-- Analyzer → Auto-suggester -->
  <line x1="490" y1="390" x2="518" y2="390" stroke="#e15a3a" stroke-width="1.6" marker-end="url(#arrow-coral)"/>
  <text x="504" y="382" text-anchor="middle" font-size="10" fill="#374151">verdict</text>

  <!-- Auto-suggester → Queue -->
  <line x1="700" y1="340" x2="710" y2="172" stroke="#e15a3a" stroke-width="1.6" marker-end="url(#arrow-coral)"/>
  <text x="746" y="248" text-anchor="middle" font-size="10" fill="#374151" transform="rotate(-86 746 248)">writes auto-suggest task</text>

  <!-- Human → Architect (dashed up) -->
  <line x1="160" y1="338" x2="160" y2="172" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-gray)"/>
  <text x="138" y="246" text-anchor="middle" font-size="10" fill="#6b7280" transform="rotate(-90 138 246)">redirect</text>

  <!-- Human → Queue (dashed diagonal up-right) -->
  <line x1="258" y1="360" x2="486" y2="172" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-gray)"/>
  <text x="412" y="278" font-size="10" fill="#6b7280">cancel / requeue</text>

  <!-- Human → Analyzer (dashed right) -->
  <line x1="260" y1="410" x2="288" y2="410" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-gray)"/>

  <!-- Human → Auto-suggester (dashed across) -->
  <path d="M 260 425 Q 390 460 518 425" fill="none" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-gray)"/>
  <text x="390" y="478" text-anchor="middle" font-size="10" fill="#6b7280">veto auto-suggest</text>

  <!-- constraints.md (bottom-right) -->
  <rect x="950" y="340" width="240" height="100" rx="10" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="1070" y="366" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">constraints.md</text>
  <text x="1070" y="390" text-anchor="middle" font-size="11" fill="#1f2937">Shared knowledge base —</text>
  <text x="1070" y="406" text-anchor="middle" font-size="11" fill="#1f2937">failures become hard rules</text>
  <text x="1070" y="422" text-anchor="middle" font-size="11" fill="#1f2937">(C-NNN) across all runs</text>

  <!-- Auto-suggester ⇄ constraints.md (bidirectional, offset) -->
  <line x1="720" y1="380" x2="948" y2="380" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-gray)"/>
  <text x="834" y="372" text-anchor="middle" font-size="10" fill="#6b7280">reads + appends</text>
  <line x1="950" y1="410" x2="722" y2="410" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-gray)"/>
  <text x="834" y="425" text-anchor="middle" font-size="10" fill="#6b7280">C-NNN rules block repeat failures</text>

  <!-- Architect ⇄ constraints.md (curved arc over the top) -->
  <path d="M 300 88 C 540 22, 900 22, 1140 340" fill="none" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-gray)"/>
  <path d="M 1140 340 C 940 -8, 480 -8, 300 110" fill="none" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-gray)"/>
  <text x="720" y="52" text-anchor="middle" font-size="10" fill="#6b7280">Architect reads / appends C-NNN</text>

  <!-- Caption: the loop -->
  <text x="625" y="500" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">The loop — verdict → auto-suggest → new run.spec → new task — is what produces a multi-day autonomous chain.</text>
</svg>
