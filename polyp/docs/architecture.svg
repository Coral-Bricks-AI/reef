<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="570" viewBox="0 0 1250 570" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="1250" height="570" fill="#ffffff"/>

  <defs>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e15a3a"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="625" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Auto-research pipeline — four LLM agents around a Postgres queue + Git repo, with a human in the loop</text>

  <!-- ============================================
       TOP ROW: Architect | Postgres queue | GPU Worker
       ============================================ -->

  <!-- Architect (top-left) -->
  <rect x="60" y="70" width="240" height="100" rx="10" fill="#f9fafb" stroke="#e15a3a" stroke-width="1.5"/>
  <text x="180" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#e15a3a">Architect (LLM)</text>
  <text x="180" y="120" text-anchor="middle" font-size="11" fill="#1f2937">Drafts run.spec + code from</text>
  <text x="180" y="136" text-anchor="middle" font-size="11" fill="#1f2937">a question or an auto-suggest</text>

  <!-- Postgres queue (top-center, pillar 1/3) -->
  <rect x="485" y="70" width="280" height="100" rx="14" fill="#fff7ed" stroke="#e15a3a" stroke-width="2.5"/>
  <text x="625" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#e15a3a">Postgres queue</text>
  <text x="625" y="114" text-anchor="middle" font-size="11" fill="#1f2937">cb_queue.experiments</text>
  <text x="625" y="134" text-anchor="middle" font-size="10" fill="#6b7280">enqueued → coding → ready →</text>
  <text x="625" y="148" text-anchor="middle" font-size="10" fill="#6b7280">executing → executed → analyzing</text>

  <!-- GPU Worker (top-right) -->
  <rect x="950" y="70" width="240" height="100" rx="10" fill="#f9fafb" stroke="#e15a3a" stroke-width="1.5"/>
  <text x="1070" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#e15a3a">GPU Worker (LLM)</text>
  <text x="1070" y="120" text-anchor="middle" font-size="11" fill="#1f2937">Claims ready task → trains +</text>
  <text x="1070" y="136" text-anchor="middle" font-size="11" fill="#1f2937">evals on H100; debug LLM on miss</text>
  <text x="1070" y="152" text-anchor="middle" font-size="11" fill="#1f2937">on kernel / OOM / env failures</text>

  <!-- Queue ⇄ Architect (offset bidirectional) -->
  <line x1="485" y1="100" x2="302" y2="100" stroke="#e15a3a" stroke-width="1.6" marker-end="url(#arrow-coral)"/>
  <text x="392" y="92" text-anchor="middle" font-size="10" fill="#374151">2. claims enqueued</text>
  <line x1="300" y1="140" x2="483" y2="140" stroke="#e15a3a" stroke-width="1.6" marker-end="url(#arrow-coral)"/>
  <text x="392" y="158" text-anchor="middle" font-size="10" fill="#374151">4. promotes to ready</text>

  <!-- Queue ⇄ GPU Worker -->
  <line x1="765" y1="100" x2="948" y2="100" stroke="#e15a3a" stroke-width="1.6" marker-end="url(#arrow-coral)"/>
  <text x="856" y="92" text-anchor="middle" font-size="10" fill="#374151">5. claims ready</text>
  <line x1="950" y1="140" x2="767" y2="140" stroke="#e15a3a" stroke-width="1.6" marker-end="url(#arrow-coral)"/>
  <text x="856" y="158" text-anchor="middle" font-size="10" fill="#374151">8. writes results state</text>

  <!-- ============================================
       MIDDLE ROW: Git repository (pillar 2/3)
       ============================================ -->

  <rect x="485" y="240" width="280" height="100" rx="14" fill="#f3f4f6" stroke="#374151" stroke-width="2.5"/>
  <text x="625" y="264" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Git repository</text>
  <text x="625" y="282" text-anchor="middle" font-size="10" fill="#6b7280">code · run.spec · results.json</text>
  <text x="625" y="296" text-anchor="middle" font-size="10" fill="#6b7280">exp/NNNN-* branches · done/ · falsified/</text>
  <line x1="500" y1="306" x2="750" y2="306" stroke="#e5e7eb" stroke-width="1"/>
  <text x="625" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">constraints.md</text>
  <text x="625" y="335" text-anchor="middle" font-size="9" fill="#6b7280">C-NNN rules block repeat failures</text>

  <!-- Architect → Git (commits exp/NNNN-* + appends C-NNN) -->
  <line x1="280" y1="170" x2="505" y2="240" stroke="#e15a3a" stroke-width="1.4" marker-end="url(#arrow-coral)"/>
  <text x="345" y="200" font-size="10" fill="#374151">3. commits exp/NNNN-*</text>
  <text x="345" y="213" font-size="10" fill="#374151">    + appends C-NNN</text>


  <!-- GPU Worker ⇄ Git (offset bidirectional; 6 above 7) -->
  <line x1="745" y1="240" x2="970" y2="170" stroke="#e15a3a" stroke-width="1.4" marker-end="url(#arrow-coral)"/>
  <text x="855" y="200" font-size="10" fill="#374151">6. reads code + spec</text>
  <line x1="978" y1="178" x2="753" y2="248" stroke="#e15a3a" stroke-width="1.4" marker-end="url(#arrow-coral)"/>
  <text x="865" y="238" font-size="10" fill="#374151">7. writes results.json</text>

  <!-- ============================================
       BOTTOM ROW: Auto-suggester | Human | Analyzer
       ============================================ -->

  <!-- Auto-suggester (bot-left, swapped from right) -->
  <rect x="60" y="410" width="240" height="100" rx="10" fill="#f9fafb" stroke="#e15a3a" stroke-width="1.5"/>
  <text x="180" y="436" text-anchor="middle" font-size="14" font-weight="700" fill="#e15a3a">Auto-suggester (LLM)</text>
  <text x="180" y="460" text-anchor="middle" font-size="11" fill="#1f2937">Proposes the next</text>
  <text x="180" y="476" text-anchor="middle" font-size="11" fill="#1f2937">experiment, enqueues</text>
  <text x="180" y="492" text-anchor="middle" font-size="11" fill="#1f2937">it for the Architect</text>

  <!-- Human overseer (bot-center, pillar 3/3) -->
  <rect x="485" y="410" width="280" height="100" rx="10" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="625" y="434" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Human overseer</text>
  <text x="625" y="455" text-anchor="middle" font-size="11" fill="#1f2937">Redirects, vetoes auto-suggests,</text>
  <text x="625" y="471" text-anchor="middle" font-size="11" fill="#1f2937">files constraints, kills runs</text>
  <!-- Slack pings (inline, inside the Human box) -->
  <g transform="translate(534, 488)">
    <rect x="3" y="0" width="3" height="9" rx="1.5" fill="#2EB67D"/>
    <rect x="7" y="3" width="9" height="3" rx="1.5" fill="#36C5F0"/>
    <rect x="10" y="7" width="3" height="9" rx="1.5" fill="#E01E5A"/>
    <rect x="0" y="10" width="9" height="3" rx="1.5" fill="#ECB22E"/>
    <text x="22" y="12" font-size="10" fill="#6b7280" font-style="italic">Slack pings from the pipeline</text>
  </g>

  <!-- Analyzer (bot-right, swapped from left) -->
  <rect x="950" y="410" width="240" height="100" rx="10" fill="#f9fafb" stroke="#e15a3a" stroke-width="1.5"/>
  <text x="1070" y="436" text-anchor="middle" font-size="14" font-weight="700" fill="#e15a3a">Analyzer (LLM)</text>
  <text x="1070" y="460" text-anchor="middle" font-size="11" fill="#1f2937">Reads executed → verdict</text>
  <text x="1070" y="476" text-anchor="middle" font-size="11" fill="#1f2937">(done / falsified / blocked);</text>
  <text x="1070" y="492" text-anchor="middle" font-size="11" fill="#1f2937">commits archive to Git</text>

  <!-- Queue ⇄ Analyzer (offset diagonals; arrow 9 flipped so Analyzer → Queue) -->
  <line x1="995" y1="410" x2="760" y2="170" stroke="#e15a3a" stroke-width="1.4" marker-end="url(#arrow-coral)"/>
  <text x="870" y="280" font-size="10" fill="#374151">9. reads executed</text>
  <line x1="1020" y1="410" x2="785" y2="170" stroke="#e15a3a" stroke-width="1.4" marker-end="url(#arrow-coral)"/>
  <text x="845" y="320" font-size="10" fill="#374151">11. files verdict</text>

  <!-- Git → Analyzer (arrow 10 flipped: Git → Analyzer) -->
  <line x1="765" y1="335" x2="945" y2="445" stroke="#e15a3a" stroke-width="1.4" marker-end="url(#arrow-coral)"/>
  <text x="800" y="378" font-size="10" fill="#374151">10. commits archive</text>
  <text x="800" y="391" font-size="10" fill="#374151">      to done/ or falsified/</text>

  <!-- Auto-suggester → Queue (writes next task) — straight diagonal -->
  <line x1="180" y1="410" x2="487" y2="145" stroke="#e15a3a" stroke-width="1.4" marker-end="url(#arrow-coral)"/>
  <text x="270" y="330" font-size="10" fill="#374151">1. writes next task</text>

  <!-- Git → Auto-suggester (reads context: done/falsified/constraints) -->
  <line x1="495" y1="335" x2="305" y2="445" stroke="#e15a3a" stroke-width="1.4" marker-end="url(#arrow-coral)" opacity="0.7"/>
  <text x="345" y="395" font-size="10" fill="#374151">12. reads context</text>

  <!-- No arrows from the Human box: the human is the universal overseer; doesn't
       need its actions enumerated. -->


  <!-- Caption: the loop -->
  <text x="625" y="545" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">The numbered loop (1 → 12 → 1) is what produces a multi-day autonomous chain. Steps 6–8 and 10–11 fire concurrently per task.</text>
</svg>
